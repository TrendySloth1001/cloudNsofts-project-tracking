# CloudNSofts nginx site — fronted by a Cloudflare Tunnel (cloudflared → this
# server on localhost:80). Cloudflare terminates public TLS, so the origin
# serves plain HTTP on :80 and path-routes to the app. No public port is
# exposed; only the tunnel and SSH reach this box.
#   /api, /health, /socket.io  -> backend  (127.0.0.1:4000)
#   everything else            -> Next.js  (127.0.0.1:3000)

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name cloudnsofts.com www.cloudnsofts.com _;

  # Uploads: images cap at 8 MB — allow headroom.
  client_max_body_size 12m;

  # Common proxy headers. The browser reached Cloudflare over HTTPS, so tell the
  # app the original scheme is https (cloudflared brings the request in on http).
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;

  # Backend REST + health.
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
  }
  location = /health {
    proxy_pass http://127.0.0.1:4000;
  }

  # Realtime (Socket.IO) — needs the WebSocket upgrade.
  location /socket.io/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
  }

  # Next.js frontend (everything else).
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
