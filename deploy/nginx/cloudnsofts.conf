# CloudNSofts nginx site — single domain, path-routed to the app.
#   /api, /health, /socket.io  -> backend  (127.0.0.1:4000)
#   everything else            -> Next.js  (127.0.0.1:3000)
# Install as /etc/nginx/sites-available/cloudnsofts.conf, symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# HTTP -> HTTPS (Cloudflare proxies over 443; 80 only redirects).
server {
  listen 80;
  listen [::]:80;
  server_name cloudnsofts.com www.cloudnsofts.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name cloudnsofts.com www.cloudnsofts.com;

  # Cloudflare Origin Certificate (SSL/TLS -> Origin Server -> Create Cert).
  ssl_certificate     /etc/ssl/cloudflare/cloudnsofts.pem;
  ssl_certificate_key /etc/ssl/cloudflare/cloudnsofts.key;
  ssl_protocols       TLSv1.2 TLSv1.3;

  # Uploads: images cap at 8 MB — allow headroom.
  client_max_body_size 12m;

  # Common proxy headers (inherited by every location below).
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Backend REST + health.
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
  }
  location = /health {
    proxy_pass http://127.0.0.1:4000;
  }

  # Realtime (Socket.IO) — needs the WebSocket upgrade.
  location /socket.io/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
  }

  # Next.js frontend (everything else).
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
