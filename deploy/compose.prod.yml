# Production data services for CloudNSofts: Postgres + MinIO, bound to
# localhost only (nginx is the sole public surface). Redis is omitted — a
# single backend instance uses in-memory realtime fanout. Bring up with:
#   docker compose --env-file deploy/deploy.env -f deploy/compose.prod.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: cnsofts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudnsofts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy.env}
      POSTGRES_DB: ${POSTGRES_DB:-cloudnsofts}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cloudnsofts} -d ${POSTGRES_DB:-cloudnsofts}']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cnsofts-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cloudnsofts}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy.env}
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
