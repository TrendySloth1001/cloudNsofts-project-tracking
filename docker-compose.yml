services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudnsofts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudnsofts
      POSTGRES_PASSWORD: cloudnsofts
      POSTGRES_DB: cloudnsofts_dev
    # Host port 5434 is used to avoid clashing with other local Postgres
    # instances already bound to 5432/5433/5435/5436.
    ports:
      - '5434:5432'
    volumes:
      - cloudnsofts_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cloudnsofts -d cloudnsofts_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cloudnsofts-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    # Host port 6381 to avoid clashing with other local Redis instances.
    ports:
      - '6381:6379'
    volumes:
      - cloudnsofts_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for uploaded images (doc screenshots, etc.).
  # Bytes live here; their metadata rows live in Postgres. The backend creates
  # the bucket on startup, so no init container is needed.
  minio:
    image: minio/minio:latest
    container_name: cloudnsofts-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: cloudnsofts
      MINIO_ROOT_PASSWORD: cloudnsofts123
    # 9000 = S3 API, 9001 = web console.
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - cloudnsofts_miniodata:/data

volumes:
  cloudnsofts_pgdata:
  cloudnsofts_redisdata:
  cloudnsofts_miniodata:
