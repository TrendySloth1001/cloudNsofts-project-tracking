services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudnsofts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudnsofts
      POSTGRES_PASSWORD: cloudnsofts
      POSTGRES_DB: cloudnsofts_dev
    # Host port 5434 is used to avoid clashing with other local Postgres
    # instances already bound to 5432/5433/5435/5436.
    ports:
      - '5434:5432'
    volumes:
      - cloudnsofts_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cloudnsofts -d cloudnsofts_dev']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cloudnsofts_pgdata:
