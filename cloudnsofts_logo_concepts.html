
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap');
.logo-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; padding:1rem 0; }
.lcard { background:var(--color-background-secondary); border-radius:var(--border-radius-lg); padding:18px 14px 14px; display:flex; flex-direction:column; align-items:center; gap:10px; }
.lcard svg { width:100%; height:92px; display:block; }
.wm { font-family:'Poppins',sans-serif; font-weight:800; font-size:18px; letter-spacing:-0.5px; color:var(--color-text-primary); }
.wm .o { color:#F26A1B; }
.cap { font-family:var(--font-sans); font-size:11px; color:var(--color-text-secondary); }
</style>

<div class="logo-grid">

  <!-- 1. CLOUD BOLT -->
  <div class="lcard">
    <svg viewBox="0 0 170 120">
      <g fill="var(--color-text-primary)">

        <circle cx="115" cy="64" r="22"/><circle cx="72" cy="42" r="18"/>
        <rect x="46" y="58" width="80" height="28" rx="14"/>
      </g>
      <polygon points="92,26 66,64 84,64 74,96 108,50 88,50" fill="#F26A1B"/>
    </svg>
    <div class="wm">cloud<span class="o">n</span>softs</div>
    <div class="cap">Cloud Bolt — speed &amp; power</div>
  </div>
